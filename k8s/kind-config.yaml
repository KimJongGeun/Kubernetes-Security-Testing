# Kind 멀티노드 클러스터 설정
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local-k8s
nodes:
  # Control Plane 노드
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # NodePort 범위
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
  # Worker 노드 1
  - role: worker
  # Worker 노드 2
  - role: worker
