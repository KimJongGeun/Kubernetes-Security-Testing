apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-nginx
  namespace: argocd
spec:
  project: default
  source:
    # GitHub 레포에서 apps/sample-nginx 폴더를 감시
    repoURL: https://github.com/KimJongGeun/Kubernetes-Security-Testing.git
    targetRevision: main
    path: apps/sample-nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      # Git이 바뀌면 자동으로 sync
      selfHeal: true      # 누가 kubectl로 직접 바꿔도 Git 상태로 되돌림
      prune: true          # Git에서 삭제된 리소스는 클러스터에서도 삭제
    syncOptions:
      - CreateNamespace=true
